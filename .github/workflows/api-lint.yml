name: api-lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  api-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed API files
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'api/*.md' 'api/**/*.md' | tr '\n' ' ')
          if [ -z "$files" ]; then
            echo "api=false" >> "$GITHUB_OUTPUT"
          else
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "api_files=$files" >> "$GITHUB_OUTPUT"
          fi

      - name: Run API lint
        if: steps.changed.outputs.api == 'true'
        working-directory: api
        run: |
          # Convert paths to be relative to the api/ directory
          changed_files=""
          for f in ${{ steps.changed.outputs.api_files }}; do
            [ -z "$f" ] && continue
            rel_path="${f#api/}"
            changed_files="${changed_files} ${rel_path}"
          done <<< "$(echo "${{ steps.changed.outputs.api_files }}" | tr ' ' '\n')"

          echo "Linting changed files:${changed_files}"
          make lint TARGET="${changed_files}"
